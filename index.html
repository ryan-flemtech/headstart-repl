<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Headstart Coding</title>
    <script>
      // Move query params from the real URL into the hash so HashRouter can read them.
      // e.g. /headstart-repl/?teacher=true  →  /headstart-repl/#/?teacher=true
      (function () {
        var search = window.location.search;
        if (search && !window.location.hash) {
          window.location.replace(
            window.location.pathname + '#/?' + search.slice(1)
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
